<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WuChu Events">
<title>WuChu — Event Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --chu:#2B5BB8;--chu-light:#EEF3FB;--chu-mid:#C5D5F2;
  --wu:#A81C1C;--wu-light:#FAEAEA;--wu-mid:#F0C0C0;
  --ink:#1A1A1A;--ink2:#444;--ink3:#777;--ink4:#AAA;
  --line:#E5E5E5;--surface:#F5F5F5;--white:#FFF;
  --warn-bg:#FFFBEA;--warn-border:#F0D060;--warn-text:#7A5800;
  --flag-bg:#FEF2F2;--flag-border:#FECACA;--flag-text:#991B1B;
  --ok-bg:#F0FAF4;--ok-border:#A7D7B8;--ok-text:#166534;
  --purple-bg:#F5F3FF;--purple-border:#C4B5FD;--purple-text:#5B21B6;
  --radius:10px;--nav-h:56px;--bottom-h:60px;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);font-size:15px;line-height:1.5;overflow:hidden}
.login-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px}
.login-screen.hidden{display:none}
.login-logo{font-family:'Playfair Display',serif;font-size:32px;font-weight:600;color:#fff;margin-bottom:6px}
.login-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:40px}
.login-card{background:var(--white);border-radius:16px;padding:28px 24px;width:100%;max-width:340px}
.login-card h2{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--ink3);margin-bottom:20px}
.user-list{display:flex;flex-direction:column;gap:8px}
.user-btn{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--radius);background:var(--white);cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:all .15s}
.user-btn:hover{border-color:var(--ink3)}.user-btn:active{transform:scale(.98)}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}
.av-1{background:#6B7280}.av-2{background:#2B5BB8}.av-3{background:#A81C1C}
.user-info{flex:1}.user-name{font-size:14px;font-weight:500;color:var(--ink)}.user-role{font-size:11px;color:var(--ink3)}
.user-level{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;border:1px solid var(--line);color:var(--ink3);background:var(--surface)}
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.pin-overlay.hidden{display:none}
.pin-card{background:var(--white);border-radius:16px;padding:28px 24px;width:100%;max-width:320px;text-align:center}
.pin-card h3{font-size:16px;font-weight:600;margin-bottom:4px}.pin-card p{font-size:13px;color:var(--ink3);margin-bottom:20px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--line);transition:background .15s}.pin-dot.filled{background:var(--ink)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pin-key{padding:14px;border:1.5px solid var(--line);border-radius:var(--radius);font-size:18px;font-weight:500;background:var(--white);cursor:pointer;transition:all .1s;color:var(--ink)}
.pin-key:active{background:var(--surface);transform:scale(.95)}.pin-key.del{font-size:14px;color:var(--ink3)}
.pin-error{font-size:13px;color:var(--flag-text);margin-top:8px;min-height:18px}
.pin-cancel{font-size:13px;color:var(--ink3);background:none;border:none;cursor:pointer;margin-top:4px;padding:8px}
.shell{display:flex;flex-direction:column;height:100vh;height:100dvh}
.admin-bar{background:var(--ink);color:#fff;padding:8px 16px;font-size:12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.admin-bar.hidden{display:none}
.admin-bar span{flex:1;opacity:.6}
.admin-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-weight:500}
.admin-btn:hover{background:rgba(255,255,255,.2)}
.topbar{height:var(--nav-h);display:flex;align-items:center;background:var(--white);border-bottom:1px solid var(--line);flex-shrink:0;z-index:20}
.back-btn{display:none;align-items:center;justify-content:center;width:44px;height:44px;background:none;border:none;cursor:pointer;color:var(--ink2);flex-shrink:0}
.back-btn svg{width:20px;height:20px}
.brand{display:flex;flex-direction:column;justify-content:center;padding:0 16px;flex:1;min-width:0}
.brand-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-sub{font-size:10px;color:var(--ink3);font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:6px;padding-right:12px;flex-shrink:0}
.access-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.ab-1{background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.ab-2{background:var(--chu-light);color:var(--chu);border:1px solid var(--chu-mid)}
.ab-3{background:var(--wu-light);color:var(--wu);border:1px solid var(--wu-mid)}
.icon-btn{width:36px;height:36px;border-radius:8px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.icon-btn:hover{background:var(--surface)}.icon-btn svg{width:18px;height:18px}
.venue-switcher{display:flex;gap:6px;padding:0 12px 0 0}
.vs-btn{padding:5px 12px;font-size:12px;font-weight:500;border-radius:20px;border:1.5px solid var(--line);background:var(--white);color:var(--ink3);cursor:pointer;transition:all .15s;white-space:nowrap}
.vs-btn:hover{border-color:var(--ink3);color:var(--ink)}
.vs-btn.vs-chu{background:var(--chu);border-color:var(--chu);color:#fff}
.vs-btn.vs-wu{background:var(--wu);border-color:var(--wu);color:#fff}
.vs-btn.vs-ov{background:var(--surface);border-color:var(--ink3);color:var(--ink)}
.body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--line);background:var(--white);display:flex;flex-direction:column;overflow:hidden}
.sidebar-hdr{padding:10px 14px 6px;border-bottom:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.sidebar-hdr-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.sidebar-switch{display:flex;gap:4px}
.ss-btn{padding:3px 8px;font-size:11px;font-weight:500;border-radius:12px;border:1px solid var(--line);background:var(--white);color:var(--ink3);cursor:pointer;transition:all .12s}
.ss-btn.ss-chu{background:var(--chu);border-color:var(--chu);color:#fff}
.ss-btn.ss-wu{background:var(--wu);border-color:var(--wu);color:#fff}
.event-list{flex:1;overflow-y:auto;padding:4px 0}
.event-list::-webkit-scrollbar{width:3px}.event-list::-webkit-scrollbar-thumb{background:var(--line)}
.evt-btn{width:100%;text-align:left;padding:9px 14px;border:none;background:none;cursor:pointer;border-left:3px solid transparent;transition:all .12s;display:flex;flex-direction:column;gap:2px}
.evt-btn:hover{background:var(--surface)}
.evt-name{font-size:13px;font-weight:500;color:var(--ink2);line-height:1.3}
.evt-date{font-size:11px;color:var(--ink4)}
.evt-status{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;margin-top:3px;display:inline-block;border:1px solid var(--line)}
.status-planning{background:var(--warn-bg);color:var(--warn-text);border-color:var(--warn-border)}
.status-confirmed{background:var(--ok-bg);color:var(--ok-text);border-color:var(--ok-border)}
.status-soldout{background:var(--purple-bg);color:var(--purple-text);border-color:var(--purple-border)}
.status-completed{background:var(--surface);color:var(--ink3);border-color:var(--line)}
.status-regular{background:var(--flag-bg);color:var(--flag-text);border-color:var(--flag-border)}
.evt-btn.active-chu{background:var(--chu-light);border-left-color:var(--chu)}
.evt-btn.active-chu .evt-name{color:var(--chu)}
.evt-btn.active-wu{background:var(--wu-light);border-left-color:var(--wu)}
.evt-btn.active-wu .evt-name{color:var(--wu)}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--surface)}
.main-inner{max-width:760px;margin:0 auto;padding:24px 20px 80px}
.mobile-list{display:none;position:absolute;inset:0;background:var(--white);z-index:30;overflow-y:auto;flex-direction:column}
.mobile-list-hdr{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;top:0;background:var(--white)}
.mobile-list-title{font-size:15px;font-weight:500;color:var(--ink);flex:1}
.close-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center}
.close-btn svg{width:16px;height:16px;color:var(--ink2)}
.mobile-venue-tabs{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--line)}
.mvt-btn{flex:1;padding:8px;font-size:13px;font-weight:500;border-radius:var(--radius);border:1.5px solid var(--line);background:var(--white);color:var(--ink3);cursor:pointer;text-align:center}
.mvt-btn.mvt-chu{background:var(--chu);border-color:var(--chu);color:#fff}
.mvt-btn.mvt-wu{background:var(--wu);border-color:var(--wu);color:#fff}
.mobile-evt-btn{width:100%;text-align:left;padding:14px 16px;border:none;background:none;cursor:pointer;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}
.mobile-evt-btn:active{background:var(--surface)}
.meb-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.meb-name{font-size:14px;font-weight:500;color:var(--ink)}
.meb-meta{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bottom-nav{display:none;height:var(--bottom-h);background:var(--white);border-top:1px solid var(--line);flex-shrink:0;align-items:stretch;z-index:20}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--ink3);font-size:10px;font-weight:500;padding:0}
.bnav-btn svg{width:20px;height:20px}
.bnav-btn.bn-ov{color:var(--ink)}.bnav-btn.bn-chu{color:var(--chu)}.bnav-btn.bn-wu{color:var(--wu)}
.ov-month{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.ov-month::after{content:'';flex:1;height:1px;background:var(--line)}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.ov-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.ov-card:active{opacity:.8;transform:scale(.98)}
.ov-card.ov-chu{border-left-color:var(--chu)}.ov-card.ov-wu{border-left-color:var(--wu)}
.ov-venue{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.ov-chu .ov-venue{color:var(--chu)}.ov-wu .ov-venue{color:var(--wu)}
.ov-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px;line-height:1.3}
.ov-date{font-size:11px;color:var(--ink3)}
.ov-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px}
.ov-pill{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;border:1px solid var(--line);color:var(--ink3);background:var(--surface)}
.ov-pill-warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text)}
.ov-pill-ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok-text)}
.event-eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.eyebrow-chu{color:var(--chu)}.eyebrow-wu{color:var(--wu)}
.switch-venue-link{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:var(--white);cursor:pointer;color:var(--ink3);transition:all .15s}
.switch-venue-link:hover{border-color:var(--ink3);color:var(--ink)}
.event-title-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.event-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:var(--ink);line-height:1.2;flex:1}
.status-select{font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;border:1.5px solid var(--line);background:var(--white);color:var(--ink2);cursor:pointer;margin-top:4px;outline:none}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.etag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:var(--surface);color:var(--ink3)}
.snapshot{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.snap-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;transition:all .15s}
.snap-card.editable{cursor:pointer}.snap-card.editable:hover{border-color:var(--ink3)}
.snap-label{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.snap-val{font-size:16px;font-weight:600;color:var(--ink);line-height:1.2}
.snap-sub{font-size:11px;color:var(--ink3);margin-top:2px}
.snap-card.snap-warn{border-color:var(--warn-border);background:var(--warn-bg)}
.snap-card.snap-warn .snap-val,.snap-card.snap-warn .snap-label{color:var(--warn-text)}
.snap-card.snap-ok{border-color:var(--ok-border);background:var(--ok-bg)}
.snap-card.snap-ok .snap-val{color:var(--ok-text)}
.tp-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:5px}
.tp-fill{height:100%;border-radius:3px;transition:width .3s}
.tp-chu{background:var(--chu)}.tp-wu{background:var(--wu)}
.hero-div{height:1px;background:var(--line);margin:14px 0}
.banner{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:var(--radius);font-size:13px;line-height:1.5;margin-bottom:8px}
.banner svg{width:15px;height:15px;flex-shrink:0;margin-top:2px}
.banner-dual{background:var(--flag-bg);border:1px solid var(--flag-border);color:var(--flag-text)}
.banner-flag{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn-text)}
.banner-suggest{background:var(--ok-bg);border:1px solid var(--ok-border);color:var(--ok-text)}
.accord{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;background:var(--white)}
.accord-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;min-height:52px}
.accord-hdr:active{background:var(--surface)}
.accord-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.accord-icon svg{width:15px;height:15px}
.ai-chu{background:var(--chu-light);color:var(--chu)}.ai-wu{background:var(--wu-light);color:var(--wu)}
.ai-neutral{background:var(--surface);color:var(--ink3)}
.ai-green{background:var(--ok-bg);color:var(--ok-text)}
.ai-purple{background:var(--purple-bg);color:var(--purple-text)}
.ai-warn{background:var(--warn-bg);color:var(--warn-text)}
.accord-title{font-size:14px;font-weight:500;color:var(--ink);flex:1}
.accord-sub{font-size:11px;color:var(--ink3);margin-right:6px}
.chev{width:16px;height:16px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.accord-body{border-top:1px solid var(--line);padding:14px}
.checklist{display:flex;flex-direction:column;gap:4px}
.chk-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;background:var(--surface);transition:background .12s}
.chk-item:hover{background:#EAEAEA}
.chk-item.done{opacity:.55}
.chk-cb{width:18px;height:18px;border:2px solid var(--ink3);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.chk-cb.checked{background:var(--ok-text);border-color:var(--ok-text)}
.chk-cb svg{display:none;width:10px;height:10px;stroke:#fff;stroke-width:3}
.chk-cb.checked svg{display:block}
.chk-body{flex:1;min-width:0}
.chk-text{font-size:13px;color:var(--ink);line-height:1.4}
.chk-item.done .chk-text{text-decoration:line-through;color:var(--ink3)}
.chk-meta{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap}
.chk-owner{font-size:11px;color:var(--ink3);background:var(--white);border:1px solid var(--line);border-radius:20px;padding:1px 7px}
.chk-due{font-size:11px;color:var(--ink3)}
.chk-due.late{color:var(--flag-text);font-weight:500}
.chk-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.chk-item:hover .chk-actions{opacity:1}
.chk-act-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--line);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:12px}
.chk-act-btn:hover{background:var(--flag-bg);color:var(--flag-text);border-color:var(--flag-border)}
.add-chk-btn,.add-row-btn,.add-ent-btn,.add-rs-btn{width:100%;padding:8px;border:1.5px dashed var(--line);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--ink3);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.add-chk-btn:hover,.add-row-btn:hover,.add-ent-btn:hover,.add-rs-btn:hover{border-color:var(--ink3);color:var(--ink2)}
.add-chk-btn svg,.add-row-btn svg,.add-ent-btn svg,.add-rs-btn svg{width:13px;height:13px}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.budget-card{background:var(--surface);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--line)}
.budget-label{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.budget-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:3px 0;border-bottom:1px solid var(--line)}
.budget-row:last-child{border-bottom:none;font-weight:600;padding-top:6px;margin-top:4px}
.budget-row span:first-child{color:var(--ink3)}
.budget-row span:last-child{color:var(--ink)}
.variance-pos{color:var(--ok-text)!important}.variance-neg{color:var(--flag-text)!important}
.budget-note{font-size:12px;padding:8px;background:var(--warn-bg);border-radius:6px;border:1px solid var(--warn-border);color:var(--warn-text);margin-top:8px}
.allergen-tbl{width:100%;border-collapse:collapse;font-size:12px}
.allergen-tbl th{text-align:left;font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;padding:5px 4px;border-bottom:1px solid var(--line);white-space:nowrap}
.allergen-tbl td{padding:7px 4px;border-bottom:1px solid var(--line);vertical-align:middle;color:var(--ink)}
.allergen-tbl tr:last-child td{border-bottom:none}
.allergen-tbl .dish-col{font-weight:500;min-width:120px}
.allergen-dot{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid var(--line);background:var(--surface);color:var(--ink4)}
.allergen-dot.active{background:var(--flag-text);border-color:var(--flag-text);color:#fff}
.allergen-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:12px;color:var(--ink3)}
.al-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px}
.run-sheet{display:flex;flex-direction:column;gap:0}

.rst-setup{background:var(--surface);color:var(--ink3);border:1px solid var(--line)}
.rst-service{background:var(--chu-light);color:var(--chu);border:1px solid var(--chu-mid)}
.rst-entertain{background:var(--purple-bg);color:var(--purple-text);border:1px solid var(--purple-border)}
.rst-close{background:var(--flag-bg);color:var(--flag-text);border:1px solid var(--flag-border)}
.ent-grid{display:flex;flex-direction:column;gap:8px}
.ent-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px}
.ent-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ent-name{font-size:14px;font-weight:500;color:var(--ink);flex:1}
.ent-confirmed{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.ent-yes{background:var(--ok-bg);color:var(--ok-text);border:1px solid var(--ok-border)}
.ent-no{background:var(--warn-bg);color:var(--warn-text);border:1px solid var(--warn-border)}
.ent-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--ink3)}
.ent-row span:last-child{color:var(--ink);font-weight:500}
.booking-info{display:grid;grid-template-columns:130px 1fr;gap:0}
.bi-row .bk,.bi-row .bv{padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.4}

.bk{color:var(--ink3);font-weight:500;padding-right:12px}.bv{color:var(--ink)}

.post-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}

.mtbl tr:last-child td{border-bottom:none}

.mtbl .cc{color:var(--ink3);font-size:11px;font-weight:500;width:100px;white-space:nowrap}
.mtbl .nc{color:var(--ink3);font-size:11px;font-style:italic;width:110px}
.mtbl .ac{width:50px;text-align:right;white-space:nowrap}
.row-action-btn{font-size:11px;padding:2px 7px;border-radius:5px;border:1px solid var(--line);background:var(--white);cursor:pointer;color:var(--ink3);margin-left:3px;transition:all .12s}
.row-action-btn:hover{border-color:var(--ink3);color:var(--ink)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:4px}.modal p{font-size:13px;color:var(--ink3);margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:5px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;font-size:14px;padding:9px 12px;border:1.5px solid var(--line);border-radius:var(--radius);font-family:'Inter',sans-serif;color:var(--ink);background:var(--white);outline:none}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--chu)}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-btn{padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none}
.modal-btn.primary{background:var(--chu);color:#fff}
.modal-btn.secondary{background:var(--surface);color:var(--ink2);border:1px solid var(--line)}
.modal-btn.danger{background:var(--flag-bg);color:var(--flag-text);border:1px solid var(--flag-border)}

// LOGIN
function initLogin(){
  document.getElementById('user-list').innerHTML=USERS.map(u=>`
    <button class="user-btn" onclick="selectUser('${u.id}')">
      <div class="user-avatar ${u.av}">${u.name[0]}</div>
      <div class="user-info"><div class="user-name">${u.name}</div><div class="user-role">${u.role}</div></div>
      <span class="user-level">L${u.level}</span>
    </button>`).join('');
}
function selectUser(id){
  pinTarget=USERS.find(u=>u.id===id);pinBuffer='';
  document.getElementById('pin-title').textContent='Welcome, '+pinTarget.name.split(' ')[0];
  document.getElementById('pin-sub').textContent='Enter your 4-digit PIN';
  document.getElementById('pin-error').textContent='';
  updatePinDots();document.getElementById('pin-overlay').classList.remove('hidden');
}
function pinKey(k){if(pinBuffer.length>=4)return;pinBuffer+=k;updatePinDots();if(pinBuffer.length===4)setTimeout(checkPin,120);}
function pinDel(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();}
function updatePinDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot'+(i<pinBuffer.length?' filled':'');}
function checkPin(){
  if(pinBuffer===pinTarget.pin){
    document.getElementById('pin-overlay').classList.add('hidden');
    document.getElementById('login-screen').classList.add('hidden');
    currentUser=pinTarget;launchApp();
  } else {
    document.getElementById('pin-error').textContent='Incorrect PIN — try again';
    pinBuffer='';updatePinDots();
  }
}
function cancelPin(){document.getElementById('pin-overlay').classList.add('hidden');pinTarget=null;pinBuffer='';}
function handleLogout(){if(!confirm('Log out?'))return;currentUser=null;document.getElementById('app-shell').style.display='none';document.getElementById('login-screen').classList.remove('hidden');document.getElementById('admin-bar').classList.add('hidden');}
function launchApp(){
  document.getElementById('app-shell').style.display='flex';
  const u=currentUser;
  const bc=u.level===3?'ab-3':u.level===2?'ab-2':'ab-1';
  document.getElementById('access-badge').className='access-badge '+bc;
  document.getElementById('access-badge').textContent=u.level===3?'Admin':u.level===2?'Editor':'View only';
  if(u.level===3)document.getElementById('admin-bar').classList.remove('hidden');
  showOverview();
}
function canEdit(){return currentUser&&currentUser.level>=2;}
function isAdmin(){return currentUser&&currentUser.level>=3;}

  }).join('');

  document.getElementById('ss-wu').className='ss-btn'+(venue==='wu'?' ss-wu':'');
}

// COMPUTED SNAPSHOT
function computeSnapshot(ev){
  const price=parseFloat((ev.price||'').replace(/[^0-9.]/g,''))||0;
  const foodAlloc=parseFloat((ev.foodAlloc||'').replace(/[^0-9.]/g,''))||0;
  const pax=parseInt(ev.pax)||0;
  const paxSold=parseInt(ev.paxSold)||0;
  const foodCount=ev.food.filter(i=>!i.s&&i.d).length;
  const bevCount=ev.bev.filter(i=>!i.s&&i.d).length;
  return{price,foodAlloc,pax,paxSold,foodCount,bevCount,
    budgetRevenue:price&&pax?price*pax:0,
    budgetFood:foodAlloc&&pax?foodAlloc*pax:0,
    entTotal:ev.entertainment.reduce((s,e)=>{const f=parseFloat((e.fee||'').replace(/[^0-9.]/g,''));return s+(isNaN(f)?0:f);},0)};
}

// OVERVIEW
function renderOverview(){
  const sorted=[...EVENTS].sort((a,b)=>a.ds.localeCompare(b.ds));
  const months={};
  sorted.forEach(ev=>{const m=new Date(ev.ds).toLocaleString('en-AU',{month:'long',year:'numeric'});if(!months[m])months[m]=[];months[m].push(ev);});
  let h='<div style="margin-bottom:20px"><div style="font-family:\'Playfair Display\',serif;font-size:24px;font-weight:600;color:var(--ink);margin-bottom:3px">All upcoming events</div><div style="font-size:13px;color:var(--ink3)">'+EVENTS.length+' events across Chu the Phat and Madame Wu</div></div>';
  Object.entries(months).forEach(([m,evs])=>{
    h+='<div class="ov-month">'+m+'</div><div class="ov-grid">';
    h+=evs.map(ev=>{
      const st=STATUSES[ev.status]||STATUSES.planning;
      const pending=ev.actions.filter(a=>!a.done).length;
      const pills=[];
      if(ev.price!=='Regular service')pills.push('<span class="ov-pill">'+ev.price+'</span>');
      if(pending)pills.push('<span class="ov-pill ov-pill-warn">'+pending+' action'+(pending>1?'s':'')+'</span>');
      if(ev.dual)pills.push('<span class="ov-pill ov-pill-warn">Both venues</span>');
      if(ev.status==='soldout')pills.push('<span class="ov-pill ov-pill-ok">Sold out</span>');
      return '<div class="ov-card ov-'+ev.venue+'" onclick="selectEvent(\''+ev.id+'\')"><div class="ov-venue">'+VN[ev.venue]+'</div><div class="ov-name">'+ev.name+'</div><div class="ov-date">'+ev.date+' <span class="evt-status '+st.cls+'" style="font-size:9px">'+st.label+'</span></div><div class="ov-pills">'+pills.join('')+'</div></div>';
    }).join('');
    h+='</div>';
  });
  document.getElementById('main-inner').innerHTML=h;
}

function accord(key,iconHtml,title,sub,body,iconCls,defOpen){

// BUDGET
function renderBudget(ev){
  const sn=computeSnapshot(ev);
  const canE=canEdit();
  const paxStr=ev.pax||'';const soldStr=ev.paxSold||'';
  const pct=paxStr&&soldStr?Math.min(100,Math.round(parseInt(soldStr)/parseInt(paxStr)*100)):0;
  let snap='<div class="snapshot">';
  if(canE){
    snap+='<div class="snap-card snap-ok editable" onclick="editSnapField(\''+ev.id+'\',\'price\')" title="Tap to edit"><div class="snap-label">Ticket price</div><div class="snap-val">'+(ev.price||'Not set')+'</div><div class="snap-sub">per person ✎</div></div>';
    snap+='<div class="snap-card'+((!ev.foodAlloc||ev.foodAlloc==='TBC'||ev.foodAlloc==='—')?' snap-warn':'')+' editable" onclick="editSnapField(\''+ev.id+'\',\'foodAlloc\')" title="Tap to edit"><div class="snap-label">Food allocation</div><div class="snap-val">'+(ev.foodAlloc||'TBC')+'</div><div class="snap-sub">per person ✎</div></div>';
    snap+='<div class="snap-card'+(!paxStr?' snap-warn':'')+' editable" onclick="editSnapField(\''+ev.id+'\',\'pax\')" title="Tap to set"><div class="snap-label">PAX / Capacity</div><div class="snap-val">'+(paxStr||'Not set')+'</div><div class="snap-sub">'+(paxStr?'expected covers ✎':'tap to set ✎')+'</div></div>';
    snap+='<div class="snap-card editable" onclick="editSnapField(\''+ev.id+'\',\'paxSold\')" title="Tap to update"><div class="snap-label">Tickets sold</div><div class="snap-val">'+(soldStr||'—')+'</div>'+(paxStr&&soldStr?'<div class="tp-bar"><div class="tp-fill tp-'+ev.venue+'" style="width:'+pct+'%"></div></div>':'')+'<div class="snap-sub">'+(paxStr?pct+'% sold ✎':'set PAX first ✎')+'</div></div>';
  } else {
    snap+='<div class="snap-card snap-ok"><div class="snap-label">Ticket price</div><div class="snap-val">'+(ev.price||'—')+'</div></div>';
    snap+='<div class="snap-card'+((!ev.foodAlloc||ev.foodAlloc==='TBC')?' snap-warn':'')+'"><div class="snap-label">Food allocation</div><div class="snap-val">'+(ev.foodAlloc||'TBC')+'</div></div>';
    snap+='<div class="snap-card'+(!paxStr?' snap-warn':'')+'"><div class="snap-label">PAX</div><div class="snap-val">'+(paxStr||'Not set')+'</div></div>';
    snap+='<div class="snap-card"><div class="snap-label">Tickets sold</div><div class="snap-val">'+(soldStr||'—')+'</div></div>';
  }
  snap+='</div>';
  const bFood=sn.foodAlloc&&sn.pax?'$'+(sn.foodAlloc*sn.pax).toFixed(0):'—';
  const bRev=sn.price&&sn.pax?'$'+(sn.price*sn.pax).toFixed(0):'—';
  const aRev=ev.actual.revenue?'$'+ev.actual.revenue:'—';
  const aFood=ev.actual.food?'$'+ev.actual.food:'—';
  const revVar=ev.actual.revenue&&sn.budgetRevenue?ev.actual.revenue-sn.budgetRevenue:null;
  const foodVar=ev.actual.food&&sn.budgetFood?sn.budgetFood-ev.actual.food:null;
  let budget='<div class="budget-grid"><div class="budget-card"><div class="budget-label">Revenue</div><div class="budget-row"><span>Budgeted</span><span>'+bRev+'</span></div><div class="budget-row"><span>Actual</span><span>'+aRev+'</span></div>'+(revVar!==null?'<div class="budget-row"><span>Variance</span><span class="'+(revVar>=0?'variance-pos':'variance-neg')+'">'+(revVar>=0?'+':'')+'$'+revVar+'</span></div>':'')+'</div><div class="budget-card"><div class="budget-label">Food cost</div><div class="budget-row"><span>Budgeted</span><span>'+bFood+'</span></div><div class="budget-row"><span>Actual</span><span>'+aFood+'</span></div>'+(foodVar!==null?'<div class="budget-row"><span>Saving</span><span class="'+(foodVar>=0?'variance-pos':'variance-neg')+'">'+(foodVar>=0?'+':'')+'$'+foodVar+'</span></div>':'')+'</div></div>';
  if(!sn.pax||!sn.price)budget+='<div class="budget-note">Set PAX and ticket price to see budget projections</div>';
  if(ev.entertainment.length){budget+='<div style="margin-top:10px;font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Entertainment</div>';budget+=ev.entertainment.map(e=>'<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--line)"><span>'+e.name+'</span><span style="color:var(--ink3)">'+(e.fee||'TBC')+'</span></div>').join('');}
  return snap+budget;
}

// ALLERGENS
function renderAllergens(ev){
  const items=ev.food.filter(i=>!i.s&&i.d);
  if(!items.length)return'<div style="font-size:13px;color:var(--ink3);font-style:italic">Add food menu items first to track allergens</div>';
  const canE=canEdit();
  const short=ALLERGENS.map(a=>a.slice(0,4));
  const legend='<div class="allergen-legend"><span><span class="al-dot" style="background:var(--flag-text);display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px"></span>Contains</span><span><span class="al-dot" style="background:var(--line);display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px"></span>Clear</span></div>';
  const hdr='<thead><tr><th style="min-width:120px">Dish</th>'+short.map(s=>'<th style="width:28px;text-align:center;padding:4px 2px">'+s+'</th>').join('')+'</tr></thead>';
  const rows=items.map(item=>{
    const idx=ev.food.indexOf(item);
    const dots=ALLERGENS.map(al=>{
      const has=item.allergens&&item.allergens[al];
      return '<td style="text-align:center"><div class="allergen-dot'+(has?' active':'')+'"'+(canE?' onclick="toggleAllergen(\''+ev.id+'\','+idx+',\''+al+'\')"':'')+' title="'+al+'">'+(has?'✓':'')+'</div></td>';
    }).join('');
    return '<tr><td class="dish-col">'+(item.d||item.l||'—')+'</td>'+dots+'</tr>';
  }).join('');
  return legend+'<div style="overflow-x:auto"><table class="allergen-tbl">'+hdr+'<tbody>'+rows+'</tbody></table></div>';
}
function toggleAllergen(evId,itemIdx,allergen){
  if(!canEdit())return;
  const item=EVENTS.find(e=>e.id===evId).food[itemIdx];
  if(!item.allergens)item.allergens={};
  item.allergens[allergen]=!item.allergens[allergen];renderEvent();
}

// MENU TABLE
function mTbl(items,cols,evId,type){
  const canE=canEdit();
  const rows=items&&items.length?items.map((it,i)=>{
    const editBtn=canE?'<button class="row-action-btn" onclick="openRowModal(\''+evId+'\',\''+type+'\','+i+')">Edit</button>':'';
    if(it.s)return '<tr class="sr"><td colspan="'+(canE?4:3)+'">'+it.l+'</td>'+(canE?'<td class="ac">'+editBtn+'</td>':'')+'</tr>';
    return '<tr><td class="cc">'+(it.l||'')+'</td><td>'+(it.d||'')+'</td><td class="nc">'+(it.n||'')+'</td>'+(canE?'<td class="ac">'+editBtn+'</td>':'')+'</tr>';
  }).join(''):'<tr><td colspan="'+(canE?4:3)+'" style="padding:14px;text-align:center;color:var(--ink3);font-style:italic;font-size:13px">Nothing added yet</td></tr>';
  const thX=canE?'<th style="width:60px"></th>':'';
  const addBtn=canE?'<button class="add-row-btn" onclick="openAddRow(\''+evId+'\',\''+type+'\')">'+IC.plus+' Add '+(type==='food'?'food item':'beverage')+'</button>':'';
  return '<table class="mtbl"><thead><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+thX+'</tr></thead><tbody>'+rows+'</tbody></table>'+addBtn;
}
function openAddRow(evId,type){
  if(!canEdit())return;
  const isFood=type==='food';
  showGenModal('Add '+(isFood?'food item':'beverage'),'',
    '<div class="modal-field"><label>'+(isFood?'Course / label':'Timing')+'</label><input id="gm-rl" placeholder="'+(isFood?'e.g. Course 1, Sides':'e.g. Arrival, Course 2')+'"/></div><div class="modal-field"><label>'+(isFood?'Dish / item':'Beverage')+'</label><input id="gm-rd" placeholder="'+(isFood?'e.g. Beef cheeks, XO sauce':'e.g. Pinot Noir 2023')+'"/></div><div class="modal-field"><label>Note (optional)</label><input id="gm-rn" placeholder="'+(isFood?'e.g. Dietary info':'e.g. Supplier, vintage')+'"/></div><div class="modal-field" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="gm-rs" style="width:auto;margin:0"/><label for="gm-rs" style="margin:0;font-size:13px">Section header (e.g. CANAPES, MAINS)</label></div>',
    '<button class="modal-btn secondary" onclick="closeModal(\'gen-modal\')">Cancel</button><button class="modal-btn primary" onclick="saveAddRow(\''+evId+'\',\''+type+'\')">Add</button>');
}
function saveAddRow(evId,type){
  const ev=EVENTS.find(e=>e.id===evId);
  const isSection=document.getElementById('gm-rs').checked;
  if(isSection)ev[type].push({s:1,l:document.getElementById('gm-rl').value.trim(),allergens:{}});
  else ev[type].push({l:document.getElementById('gm-rl').value.trim(),d:document.getElementById('gm-rd').value.trim(),n:document.getElementById('gm-rn').value.trim(),allergens:{}});
  closeModal('gen-modal');renderEvent();
}
function openRowModal(evId,type,idx){
  if(!canEdit())return;
  const ev=EVENTS.find(e=>e.id===evId);const item=ev[type][idx];const isSection=!!item.s;const isFood=type==='food';
  showGenModal(isSection?'Edit section header':'Edit item','',
    isSection?'<div class="modal-field"><label>Section heading</label><input id="gm-rl" value="'+(item.l||'')+'"/></div>':'<div class="modal-field"><label>'+(isFood?'Course / label':'Timing')+'</label><input id="gm-rl" value="'+(item.l||'')+'"/></div><div class="modal-field"><label>'+(isFood?'Dish / item':'Beverage')+'</label><input id="gm-rd" value="'+(item.d||'')+'"/></div><div class="modal-field"><label>Note (optional)</label><input id="gm-rn" value="'+(item.n||'')+'"/></div>',
    '<button class="modal-btn danger" onclick="deleteRow(\''+evId+'\',\''+type+'\','+idx+')">Delete</button><button class="modal-btn secondary" onclick="closeModal(\'gen-modal\')">Cancel</button><button class="modal-btn primary" onclick="saveRow(\''+evId+'\',\''+type+'\','+idx+','+isSection+')">Save</button>');
}
function saveRow(evId,type,idx,isSection){
  const item=EVENTS.find(e=>e.id===evId)[type][idx];
  item.l=document.getElementById('gm-rl').value.trim();
  if(!isSection){item.d=(document.getElementById('gm-rd')||{value:''}).value.trim();item.n=(document.getElementById('gm-rn')||{value:''}).value.trim();}
  closeModal('gen-modal');renderEvent();
}
function deleteRow(evId,type,idx){
  if(!confirm('Delete this item?'))return;
  EVENTS.find(e=>e.id===evId)[type].splice(idx,1);closeModal('gen-modal');renderEvent();
}

// BOOKING INFO
function renderBookingInfo(ev){
  return '<div class="booking-info">'+editableField(ev.id,'bookingStatus',ev.bookingStatus,'Status')+editableField(ev.id,'bookingChannel',ev.bookingChannel,'Channel')+editableField(ev.id,'bookingUrl',ev.bookingUrl,'Booking URL')+editableField(ev.id,'bookingCutoff',ev.bookingCutoff,'Closes when')+editableField(ev.id,'staffing',ev.staffing,'Staffing')+'</div>'+notesArea(ev.id,'detail','Additional notes');
}

// POST EVENT
function renderPostEvent(ev){
  const canE=canEdit();
  const isCompleted=ev.status==='completed';
  if(!isCompleted&&!canE)return'<div style="font-size:13px;color:var(--ink3);font-style:italic">Debrief unlocks when event is marked Completed</div>';
  const a=ev.actual;
  const sn=computeSnapshot(ev);
  const revVar=a.revenue&&sn.budgetRevenue?a.revenue-sn.budgetRevenue:null;
  const postCards='<div class="post-grid"><div class="post-card"><div class="post-label">Final covers</div><div class="post-val">'+(a.covers||'—')+'</div>'+(canE?'<button class="notes-edit-btn" style="margin-top:6px" onclick="editActual(\''+ev.id+'\',\'covers\',\'Final covers\')">'+IC.edit+' Edit</button>':'')+'</div><div class="post-card"><div class="post-label">Actual revenue</div><div class="post-val">'+(a.revenue?'$'+a.revenue:'—')+'</div>'+(revVar!==null?'<div class="post-sub">vs budget: '+(revVar>=0?'+':'')+'$'+revVar+'</div>':'')+(canE?'<button class="notes-edit-btn" style="margin-top:6px" onclick="editActual(\''+ev.id+'\',\'revenue\',\'Actual revenue\')">'+IC.edit+' Edit</button>':'')+'</div><div class="post-card"><div class="post-label">Actual food cost</div><div class="post-val">'+(a.food?'$'+a.food:'—')+'</div>'+(canE?'<button class="notes-edit-btn" style="margin-top:6px" onclick="editActual(\''+ev.id+'\',\'food\',\'Actual food cost\')">'+IC.edit+' Edit</button>':'')+'</div><div class="post-card"><div class="post-label">Entertainment cost</div><div class="post-val">'+(a.entertainment?'$'+a.entertainment:'—')+'</div>'+(canE?'<button class="notes-edit-btn" style="margin-top:6px" onclick="editActual(\''+ev.id+'\',\'entertainment\',\'Entertainment cost\')">'+IC.edit+' Edit</button>':'')+'</div></div>';
  return (isCompleted?postCards:'<div class="budget-note">Mark event as Completed to enter debrief actuals</div>')+notesArea(ev.id,'rs','What worked / what to change next time');
}
function editActual(evId,field,label){
  if(!canEdit())return;
  const ev=EVENTS.find(e=>e.id===evId);
  showGenModal('Edit '+label,'','<div class="modal-field"><label>'+label+'</label><input id="gm-actval" type="number" value="'+(ev.actual[field]||'')+'"/></div>',
    '<button class="modal-btn secondary" onclick="closeModal(\'gen-modal\')">Cancel</button><button class="modal-btn primary" onclick="saveActual(\''+evId+'\',\''+field+'\')">Save</button>');
}
function saveActual(evId,field){
  EVENTS.find(e=>e.id===evId).actual[field]=parseFloat(document.getElementById('gm-actval').value)||0;
  closeModal('gen-modal');renderEvent();
}

// ADD EVENT
function confirmAddEvent(){
  const v=document.getElementById('em-venue').value;
  const name=document.getElementById('em-name').value.trim();
  const date=document.getElementById('em-date').value.trim();
  const ds=document.getElementById('em-ds').value.trim();
  if(!name||!date||!ds){alert('Please fill in venue, name, date and sort date.');return;}
  EVENTS.push({id:'evt-'+Date.now(),venue:v,date,ds,name,
    price:document.getElementById('em-price').value.trim()||'TBC',
    foodAlloc:document.getElementById('em-food').value.trim()||'TBC',
    pax:'',paxSold:'',type:document.getElementById('em-type').value,
    style:document.getElementById('em-style').value,status:'planning',
    dual:document.getElementById('em-dual').value==='true',
    bookingStatus:'On sale',bookingChannel:'Now Book It',bookingUrl:'',
    bookingCutoff:'Sold out or called by management',staffing:'',suggest:'',
    notes_detail:'',notes_food:'',notes_bev:'',notes_rs:'',
    actions:[],entertainment:[],runsheet:[],
    actual:{covers:0,revenue:0,food:0,entertainment:0,notes:''},
    food:[],bev:[]});
  closeModal('event-modal');venue=v;
  activeId=EVENTS[EVENTS.length-1].id;viewState='event';
  updateVenueSwitcher();renderSidebar();renderEvent();
}
function manageUsers(){alert('To change PINs or add users, open this HTML file in a text editor and update the USERS array near the top of the script.');}

// MAIN RENDER
function renderEvent(){
  const ev=EVENTS.find(e=>e.id===activeId);if(!ev)return;
  const vc=ev.venue;const other=vc==='chu'?'wu':'chu';const sn=computeSnapshot(ev);const canE=canEdit();
  let h='';
  if(ev.dual)h+='<div class="banner banner-dual">'+IC.alert+'<span>Both venues running events on this date — cross-venue staffing and reservations coordination required.</span></div>';
  if(ev.suggest)h+='<div class="banner banner-suggest">'+IC.bulb+'<span>'+ev.suggest+'</span></div>';
  h+='<div class="event-eyebrow eyebrow-'+vc+'">'+VN[vc]+' &nbsp;&middot;&nbsp; '+ev.date+' <button class="switch-venue-link" onclick="switchVenue(\''+other+'\')">Switch to '+VN[other]+' &rarr;</button></div>';
  h+='<div class="event-title-row"><div class="event-title">'+ev.name+'</div>'+(canE?'<select class="status-select" onchange="changeStatus(\''+ev.id+'\',this.value)">'+Object.entries(STATUSES).map(([k,v])=>'<option value="'+k+'"'+(ev.status===k?' selected':'')+'>'+v.label+'</option>').join('')+'</select>':'<span class="evt-status '+(STATUSES[ev.status]?.cls||'')+'" style="font-size:12px;padding:4px 10px">'+(STATUSES[ev.status]?.label||'')+'</span>')+'</div>';
  h+='<div class="tag-row"><span class="etag">'+(ev.type||'Ticketed')+'</span><span class="etag">'+(ev.style||'Sit-down')+'</span>'+(ev.dual?'<span class="etag" style="background:var(--flag-bg);color:var(--flag-text);border-color:var(--flag-border)">Both venues</span>':'')+(ev.entertainment.length?'<span class="etag" style="background:var(--purple-bg);color:var(--purple-text);border-color:var(--purple-border)">Entertainment</span>':'')+'</div>';
  h+='<div class="hero-div"></div>';
  const pendingActions=ev.actions.filter(a=>!a.done);
  if(pendingActions.length){const today=new Date().toISOString().slice(0,10);const overdue=pendingActions.filter(a=>a.due&&a.due<today).length;h+='<div class="banner banner-flag">'+IC.warn+'<span>'+pendingActions.length+' action'+(pendingActions.length>1?'s':'')+' outstanding'+(overdue?' · '+overdue+' overdue':'')+'</span></div>';}
  h+='<div style="height:10px"></div>';
  const bSub=sn.pax&&sn.price?'$'+(sn.price*sn.pax).toLocaleString()+' projected':'Set PAX and price to project';
  h+=accord(ev.id+'-bud',IC.dollar,'Budget & tickets',bSub,renderBudget(ev),'ai-green',true);
  const actSub=ev.actions.filter(a=>!a.done).length+' of '+ev.actions.length+' outstanding';
  h+=accord(ev.id+'-act',IC.list,'Actions & checklist',actSub,renderChecklist(ev),'ai-warn',true);
  h+=accord(ev.id+'-bk',IC.ticket,'Booking & operations','',renderBookingInfo(ev),'ai-neutral',false);
  const foodSub=sn.foodCount+' items'+(ev.foodAlloc&&ev.foodAlloc!=='TBC'&&ev.foodAlloc!=='—'?' · alloc '+ev.foodAlloc:'');
  h+=accord(ev.id+'-food',IC.food,'Food menu',foodSub,mTbl(ev.food,['Course','Item','Note'],ev.id,'food')+notesArea(ev.id,'food','Food notes'),'ai-'+vc,false);
  h+=accord(ev.id+'-bev',IC.wine,'Beverage',sn.bevCount+' items',mTbl(ev.bev,['Timing','Beverage','Note'],ev.id,'bev')+notesArea(ev.id,'bev','Beverage notes'),'ai-'+vc,false);
  const flaggedDishes=ev.food.filter(i=>!i.s&&Object.values(i.allergens||{}).some(Boolean)).length;
  h+=accord(ev.id+'-alg',IC.leaf,'Allergen register',flaggedDishes+' dishes flagged',renderAllergens(ev),'ai-neutral',false);
  if(ev.entertainment.length||canE){const entSub=ev.entertainment.length?ev.entertainment.filter(e=>e.confirmed).length+'/'+ev.entertainment.length+' confirmed':'None added';h+=accord(ev.id+'-ent',IC.music,'Entertainment & extras',entSub,renderEntertainment(ev),'ai-purple',false);}
  h+=accord(ev.id+'-rs',IC.clock,'Run sheet',ev.runsheet.length?ev.runsheet.length+' items':'Not built yet',renderRunsheet(ev),'ai-neutral',false);
  h+=accord(ev.id+'-post',IC.star,'Post-event debrief',ev.status==='completed'?'Completed':'Pending',renderPostEvent(ev),'ai-green',false);
  document.getElementById('main-inner').innerHTML=h;
}

initLogin();
</script>
